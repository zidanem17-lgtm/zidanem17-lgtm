<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->

  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Grid lines -->

  <g opacity="0.06" stroke="#00f0ff">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Animated falling code columns -->

  <g font-family="monospace" font-size="11" fill="#00f0ff" opacity="0.15">
    <!-- Column 1 -->
    <text x="50" y="0">
      <animate attributeName="y" from="-20" to="320" dur="8s" repeatCount="indefinite"/>
      01001
    </text>
    <text x="50" y="-100">
      <animate attributeName="y" from="-120" to="320" dur="8s" repeatCount="indefinite"/>
      11010
    </text>
    <!-- Column 2 -->
    <text x="130" y="-60">
      <animate attributeName="y" from="-60" to="320" dur="6s" repeatCount="indefinite"/>
      10110
    </text>
    <text x="130" y="-180">
      <animate attributeName="y" from="-180" to="320" dur="6s" repeatCount="indefinite"/>
      01101
    </text>
    <!-- Column 3 -->
    <text x="210" y="-30">
      <animate attributeName="y" from="-30" to="320" dur="9s" repeatCount="indefinite"/>
      11001
    </text>
    <!-- Column 4 -->
    <text x="690" y="-90">
      <animate attributeName="y" from="-90" to="320" dur="7s" repeatCount="indefinite"/>
      00110
    </text>
    <text x="690" y="-210">
      <animate attributeName="y" from="-210" to="320" dur="7s" repeatCount="indefinite"/>
      10011
    </text>
    <!-- Column 5 -->
    <text x="770" y="-10">
      <animate attributeName="y" from="-10" to="320" dur="5.5s" repeatCount="indefinite"/>
      11100
    </text>
    <!-- Column 6 -->
    <text x="840" y="-140">
      <animate attributeName="y" from="-140" to="320" dur="8.5s" repeatCount="indefinite"/>
      01011
    </text>
    <text x="840" y="-40">
      <animate attributeName="y" from="-40" to="320" dur="8.5s" repeatCount="indefinite"/>
      10100
    </text>
  </g>

  <!-- Scanning line -->

  <rect width="900" height="2" fill="url(#cyan-glow)" opacity="0.3">
    <animate attributeName="y" from="0" to="300" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Main text -->

  <text x="450" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#00f0ff" opacity="0.6" letter-spacing="8">
    INITIALIZING SECURE CONNECTION
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="155" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="42" fill="#00f0ff" filter="url(#glow)" letter-spacing="6">
    C . M I L L E R
  </text>

  <text x="450" y="190" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b949e" letter-spacing="5">
    CYBERSECURITY  ·  FULL-STACK DEV  ·  DIGITAL FORENSICS
  </text>

  <!-- Bottom decorative line -->

  <rect x="250" y="220" width="400" height="1" fill="url(#cyan-glow)" opacity="0.5"/>

  <!-- Blinking cursor -->

  <rect x="448" y="235" width="8" height="16" fill="#00f0ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="380" y="248" font-family="monospace" font-size="12" fill="#00ff88" opacity="0.7">
    root@c-miller:~$
  </text>

  <!-- Corner brackets -->

  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.4">
    <!-- Top left -->
    <path d="M 20,20 L 20,50"/>
    <path d="M 20,20 L 50,20"/>
    <!-- Top right -->
    <path d="M 880,20 L 880,50"/>
    <path d="M 880,20 L 850,20"/>
    <!-- Bottom left -->
    <path d="M 20,280 L 20,250"/>
    <path d="M 20,280 L 50,280"/>
    <!-- Bottom right -->
    <path d="M 880,280 L 880,250"/>
    <path d="M 880,280 L 850,280"/>
  </g>

  <!-- Pulsing dots -->

  <circle cx="30" cy="150" r="3" fill="#00f0ff" opacity="0.5">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="150" r="3" fill="#00f0ff" opacity="0.5">
    <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
