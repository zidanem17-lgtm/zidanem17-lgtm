<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="450" y1="0" x2="450" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E17"/>
      <stop offset="1" stop-color="#07111C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .hud { fill: #00F0FF; font-family: "Courier New", monospace; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
      .subhud { fill: #8B949E; font-family: "Courier New", monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; }
      .enemyText { fill: #09131D; font-family: "Courier New", monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="900" height="240" rx="18" fill="url(#bg)"/>

  <g class="pixel" opacity="0.55">
    <rect x="40" y="28" width="4" height="4" fill="#00F0FF"/>
    <rect x="126" y="58" width="4" height="4" fill="#00FF88"/>
    <rect x="188" y="36" width="4" height="4" fill="#00F0FF"/>
    <rect x="274" y="82" width="4" height="4" fill="#00FF88"/>
    <rect x="358" y="30" width="4" height="4" fill="#00F0FF"/>
    <rect x="446" y="64" width="4" height="4" fill="#00FF88"/>
    <rect x="534" y="38" width="4" height="4" fill="#00F0FF"/>
    <rect x="616" y="76" width="4" height="4" fill="#00FF88"/>
    <rect x="706" y="30" width="4" height="4" fill="#00F0FF"/>
    <rect x="782" y="56" width="4" height="4" fill="#00FF88"/>
    <rect x="854" y="34" width="4" height="4" fill="#00F0FF"/>
  </g>

  <text x="36" y="34" class="hud">PIXEL REPO DEFENDER</text>
  <text x="36" y="54" class="subhud">SHOOTING DOWN COMMITS, PRS, REVIEWS, ISSUES, AND STARS</text>
  <rect x="36" y="66" width="828" height="2" fill="#0D2434"/>
  <rect x="36" y="200" width="828" height="2" fill="#0D2434"/>

  <g class="pixel" filter="url(#glow)">
    <rect x="190" y="176" width="6" height="14" fill="#00F0FF">
      <animate attributeName="y" values="176;-10" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="320" y="176" width="6" height="14" fill="#00FF88">
      <animate attributeName="y" values="176;-10" dur="1.05s" begin="0.18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.05s" begin="0.18s" repeatCount="indefinite"/>
    </rect>
    <rect x="450" y="176" width="6" height="14" fill="#00F0FF">
      <animate attributeName="y" values="176;-10" dur="0.95s" begin="0.08s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="0.95s" begin="0.08s" repeatCount="indefinite"/>
    </rect>
    <rect x="580" y="176" width="6" height="14" fill="#00FF88">
      <animate attributeName="y" values="176;-10" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="710" y="176" width="6" height="14" fill="#00F0FF">
      <animate attributeName="y" values="176;-10" dur="1.25s" begin="0.42s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.25s" begin="0.42s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g class="pixel">
    <g transform="translate(142,-30)">
      <animateTransform attributeName="transform" type="translate" values="142,-30;142,150" dur="6s" begin="0s" repeatCount="indefinite"/>
      <rect width="96" height="30" rx="4" fill="#00FF88"/>
      <rect x="10" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="24" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="72" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="62" y="18" width="10" height="4" fill="#0A0E17"/>
      <text x="39" y="20" class="enemyText">COMMIT</text>
    </g>
    <g transform="translate(272,-48)">
      <animateTransform attributeName="transform" type="translate" values="272,-48;272,145" dur="6.8s" begin="0.7s" repeatCount="indefinite"/>
      <rect width="96" height="30" rx="4" fill="#00F0FF"/>
      <rect x="10" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="24" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="72" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="62" y="18" width="10" height="4" fill="#0A0E17"/>
      <text x="50" y="20" class="enemyText">PR</text>
    </g>
    <g transform="translate(402,-36)">
      <animateTransform attributeName="transform" type="translate" values="402,-36;402,150" dur="5.7s" begin="0.25s" repeatCount="indefinite"/>
      <rect width="96" height="30" rx="4" fill="#7FE7FF"/>
      <rect x="10" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="24" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="72" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="62" y="18" width="10" height="4" fill="#0A0E17"/>
      <text x="34" y="20" class="enemyText">REVIEW</text>
    </g>
    <g transform="translate(532,-54)">
      <animateTransform attributeName="transform" type="translate" values="532,-54;532,146" dur="6.4s" begin="1.1s" repeatCount="indefinite"/>
      <rect width="96" height="30" rx="4" fill="#00FF88"/>
      <rect x="10" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="24" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="72" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="62" y="18" width="10" height="4" fill="#0A0E17"/>
      <text x="38" y="20" class="enemyText">ISSUE</text>
    </g>
    <g transform="translate(662,-34)">
      <animateTransform attributeName="transform" type="translate" values="662,-34;662,150" dur="5.9s" begin="0.5s" repeatCount="indefinite"/>
      <rect width="96" height="30" rx="4" fill="#00F0FF"/>
      <rect x="10" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="24" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="72" y="8" width="10" height="10" fill="#0A0E17"/>
      <rect x="62" y="18" width="10" height="4" fill="#0A0E17"/>
      <text x="42" y="20" class="enemyText">STAR</text>
    </g>
  </g>

  <g class="pixel" transform="translate(348,154)" filter="url(#glow)">
    <rect x="42" y="0" width="120" height="8" fill="#0D2434"/>
    <rect x="26" y="8" width="152" height="8" fill="#0D2434"/>
    <rect x="10" y="16" width="184" height="8" fill="#00F0FF"/>
    <rect x="0" y="24" width="204" height="8" fill="#00FF88"/>
    <rect x="18" y="32" width="32" height="8" fill="#00F0FF"/>
    <rect x="154" y="32" width="32" height="8" fill="#00F0FF"/>
    <rect x="58" y="32" width="88" height="8" fill="#0D2434"/>
    <rect x="72" y="40" width="60" height="8" fill="#0D2434"/>
    <rect x="88" y="48" width="28" height="8" fill="#00F0FF"/>
    <rect x="96" y="56" width="12" height="8" fill="#00FF88">
      <animate attributeName="opacity" values="1;0.25;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="36" y="224" class="subhud">STATUS: ALL SYSTEMS FIRING</text>
</svg>
