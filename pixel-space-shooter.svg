<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Pixel space shooter animation</title>
  <desc>A pixel spaceship blasts falling repository activity targets.</desc>
  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#112036" stroke-width="1"/>
    </pattern>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .label {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
      }
      .small {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.2px;
      }
    </style>
  </defs>

  <rect width="900" height="180" rx="18" fill="#0A0E17"/>
  <rect width="900" height="180" rx="18" fill="url(#grid)" opacity="0.5"/>
  <rect x="18" y="18" width="864" height="144" rx="12" stroke="#12304A"/>

  <g class="pixel">
    <rect x="92" y="34" width="4" height="4" fill="#8BF6FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="214" y="62" width="4" height="4" fill="#00F0FF">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="318" y="28" width="4" height="4" fill="#9AA7B5">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="478" y="40" width="4" height="4" fill="#8BF6FF">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="612" y="22" width="4" height="4" fill="#00FF88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="744" y="54" width="4" height="4" fill="#00F0FF">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="820" y="34" width="4" height="4" fill="#8BF6FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="38" y="40" class="label" fill="#00F0FF">REPO ACTIVITY DEFENSE</text>
  <text x="38" y="58" class="small" fill="#7E8B9A">PIXEL MODE :: DEFEND THE COMMIT STREAM</text>

  <g filter="url(#glowCyan)">
    <g transform="translate(132,-28)">
      <animateTransform attributeName="transform" type="translate" values="132,-28;132,144;132,144" dur="5.4s" begin="0s" repeatCount="indefinite"/>
      <rect class="pixel" x="0" y="0" width="74" height="20" rx="4" fill="#101C2D" stroke="#00F0FF" stroke-width="2"/>
      <rect class="pixel" x="8" y="6" width="8" height="8" fill="#00F0FF"/>
      <rect class="pixel" x="20" y="6" width="8" height="8" fill="#00F0FF"/>
      <rect class="pixel" x="46" y="6" width="8" height="8" fill="#00F0FF"/>
      <rect class="pixel" x="58" y="6" width="8" height="8" fill="#00F0FF"/>
      <text x="37" y="14" text-anchor="middle" class="small" fill="#DFFBFF">COMMIT</text>
    </g>

    <g transform="translate(272,-54)">
      <animateTransform attributeName="transform" type="translate" values="272,-54;272,144;272,144" dur="6.2s" begin="1.1s" repeatCount="indefinite"/>
      <rect class="pixel" x="0" y="0" width="58" height="20" rx="4" fill="#101C2D" stroke="#00FF88" stroke-width="2"/>
      <rect class="pixel" x="8" y="6" width="8" height="8" fill="#00FF88"/>
      <rect class="pixel" x="42" y="6" width="8" height="8" fill="#00FF88"/>
      <text x="29" y="14" text-anchor="middle" class="small" fill="#DFFFF1">PUSH</text>
    </g>

    <g transform="translate(418,-30)">
      <animateTransform attributeName="transform" type="translate" values="418,-30;418,144;418,144" dur="5.1s" begin="2s" repeatCount="indefinite"/>
      <rect class="pixel" x="0" y="0" width="46" height="20" rx="4" fill="#101C2D" stroke="#FFC857" stroke-width="2"/>
      <rect class="pixel" x="8" y="6" width="8" height="8" fill="#FFC857"/>
      <rect class="pixel" x="30" y="6" width="8" height="8" fill="#FFC857"/>
      <text x="23" y="14" text-anchor="middle" class="small" fill="#FFF1C7">PR</text>
    </g>

    <g transform="translate(554,-44)">
      <animateTransform attributeName="transform" type="translate" values="554,-44;554,144;554,144" dur="6.5s" begin="0.7s" repeatCount="indefinite"/>
      <rect class="pixel" x="0" y="0" width="64" height="20" rx="4" fill="#101C2D" stroke="#FF7AA2" stroke-width="2"/>
      <rect class="pixel" x="8" y="6" width="8" height="8" fill="#FF7AA2"/>
      <rect class="pixel" x="48" y="6" width="8" height="8" fill="#FF7AA2"/>
      <text x="32" y="14" text-anchor="middle" class="small" fill="#FFE2EA">ISSUE</text>
    </g>

    <g transform="translate(696,-24)">
      <animateTransform attributeName="transform" type="translate" values="696,-24;696,144;696,144" dur="4.9s" begin="1.7s" repeatCount="indefinite"/>
      <rect class="pixel" x="0" y="0" width="58" height="20" rx="4" fill="#101C2D" stroke="#A78BFA" stroke-width="2"/>
      <rect class="pixel" x="8" y="6" width="8" height="8" fill="#A78BFA"/>
      <rect class="pixel" x="42" y="6" width="8" height="8" fill="#A78BFA"/>
      <text x="29" y="14" text-anchor="middle" class="small" fill="#EEE7FF">FORK</text>
    </g>
  </g>

  <g filter="url(#glowGreen)">
    <rect class="pixel" x="438" y="112" width="4" height="14" fill="#00FF88">
      <animate attributeName="y" values="112;-16" dur="0.95s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="0.95s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect class="pixel" x="448" y="112" width="4" height="14" fill="#00FF88">
      <animate attributeName="y" values="112;-16" dur="0.95s" begin="0.22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="0.95s" begin="0.22s" repeatCount="indefinite"/>
    </rect>
    <rect class="pixel" x="458" y="112" width="4" height="14" fill="#00FF88">
      <animate attributeName="y" values="112;-16" dur="0.95s" begin="0.44s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="0.95s" begin="0.44s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g class="pixel" filter="url(#glowGreen)">
    <g transform="translate(450 122)">
      <animateTransform attributeName="transform" type="translate" values="450 122;447 122;453 122;450 122" dur="1.1s" repeatCount="indefinite"/>
      <rect x="-6" y="-18" width="12" height="10" fill="#00F0FF"/>
      <rect x="-18" y="-8" width="36" height="10" fill="#00F0FF"/>
      <rect x="-26" y="2" width="52" height="10" fill="#0F2034"/>
      <rect x="-18" y="2" width="36" height="10" fill="#00FF88"/>
      <rect x="-8" y="12" width="16" height="6" fill="#FFC857"/>
      <rect x="-30" y="8" width="8" height="10" fill="#00F0FF"/>
      <rect x="22" y="8" width="8" height="10" fill="#00F0FF"/>
      <rect x="-4" y="-24" width="8" height="6" fill="#DFFFF1"/>
    </g>
  </g>

  <g class="pixel">
    <rect x="426" y="112" width="48" height="2" fill="#12304A"/>
    <rect x="410" y="132" width="80" height="2" fill="#12304A"/>
    <rect x="438" y="146" width="24" height="2" fill="#12304A"/>
  </g>
</svg>
